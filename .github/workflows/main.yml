name: 'Mend掃描(old-ts-web)'

on:
  workflow_dispatch:

env:
  # GitHub Secrets (從 GitHub Secrets 取得)
  GITHUB_TOKEN: ${{ secrets.ORG_ACTION_ACCESS_TOKEN }}
  MEND_EMAIL: ${{ secrets.MEND_EMAIL }}
  MEND_USER_KEY: ${{ secrets.MEND_USER_KEY }}
  MEND_ORG_UUID: ${{ secrets.MEND_ORG_UUID }}   # Mend Platform -> Administration -> General Configuration -> Organization UUID
  MEND_ORGANIZATION: ${{ secrets.MEND_ORG_UUID }}  # Mend CLI 登入用，跟 MEND_ORG_UUID 是同一組值，直接共用

  # 部門名稱 如 OLD_TS
  DEPARTMENT: 'OLD_TS'

  # Category 前綴對照表 (JSON 格式)
  CATEGORY_GROUPS_JSON: |
    {
      "Api": ["Server(.NET)","Server(Go)"],
      "Server_Web": ["Client(Vue)", "Tool(.NET)", "Package(.NET)", "ServerClient(.Net Framework)", "DLL(.Net Framework)", "Tool(.Net Framework)"]
    }

  # Mend 設定
  MEND_URL: 'https://saas.mend.io'
  # Mend AppSec Platform API v3.0 - 統一用來拉 SCA (SBOM/Risk/Inventory/Due Diligence) 與 SAST (Code Compliance) 報告
  MEND_API_URL: 'https://api-saas.mend.io/api/v3.0'

  # API 設定
  GITHUB_API: 'https://api.github.com'

jobs:
  run-MendScanRepo:
    runs-on:
      group: OLD_TS_WEB_RUNNER_GROUP
    timeout-minutes: 1440
    env:
      PYTHONUNBUFFERED: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Python version
        shell: cmd
        run: python --version

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run MendScanRepo.py inside workflow
        shell: python
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
          MEND_EMAIL: ${{ env.MEND_EMAIL }}
          MEND_USER_KEY: ${{ env.MEND_USER_KEY }}
          MEND_ORG_UUID: ${{ env.MEND_ORG_UUID }}
          MEND_ORGANIZATION: ${{ env.MEND_ORGANIZATION }}
          MEND_URL: ${{ env.MEND_URL }}
          MEND_API_URL: ${{ env.MEND_API_URL }}
          GITHUB_API: ${{ env.GITHUB_API }}
          DEPARTMENT: ${{ env.DEPARTMENT }}
          CATEGORY_GROUPS_JSON: ${{ env.CATEGORY_GROUPS_JSON }}
        run: |
          import os, json, requests, subprocess, time, sys, signal, threading, re

          # ============================================================
          # 使用者可調整參數 (放在腳本最上方，方便自行修改)
          # ============================================================
          # Mend CLI 執行檔的固定路徑 (self-hosted runner 上手動放置好的位置)
          # 若這台 runner 上的路徑不同，改這裡就好，不用改下面呼叫的地方
          MEND_CLI_PATH = r"C:\mend\cli\mend.exe"
          # Unified Agent 設定檔路徑 (mend ua -c 用)
          MEND_UA_PATH = r"C:\mend\wss-unified-agent.txt"

          # Code Compliance Report (SAST) 使用的合規標準
          # 可選值：Default, OWASP Top 10 2017, OWASP Top 10 2021, OWASP Top 10 2025,
          #         PCI DSS, PCI DSS 4.0, NIST, SANS/CWE Top 25, HIPAA, HITRUST, CAPEC, MISRA
          COMPLIANCE_STANDARD = "OWASP Top 10 2025"

          # Code Compliance Report 的詳細程度 (必填欄位，之前漏掉導致 400 錯誤)
          # 可選值：technical (完整技術細節) / short / summary (摘要)
          COMPLIANCE_REPORT_LEVEL = "technical"

          # SBOM 報告：reportType 決定輸出的 SBOM 標準 (cycloneDX / spdx 等)，format 決定檔案格式
          SBOM_REPORT_TYPE = "cycloneDX"
          SBOM_FORMAT = "json"

          # Risk Report 格式 (依 Mend Platform UI 固定為 PDF)
          RISK_REPORT_FORMAT = "pdf"

          # Inventory Report 格式：excel / json / xml
          INVENTORY_REPORT_FORMAT = "excel"

          # Due Diligence Report 格式：excel / json / xml (不支援 pdf)
          DUE_DILIGENCE_FORMAT = "json"

          # Mend 後台處理掃描結果的輪詢設定（掃描完到 project 出現在 API 之間的等待）
          PROJECT_WAIT_MAX_RETRIES = 10
          PROJECT_WAIT_INTERVAL_SECONDS = 15

          # 非同步報告的輪詢設定
          REPORT_POLL_MAX_RETRIES = 20
          REPORT_POLL_INTERVAL_SECONDS = 15
          # ============================================================

          CANCEL = threading.Event()

          # 強制 stdout/stderr 用 UTF-8，避免 Windows 主機預設編碼 (如 cp950) 造成中文亂碼或解碼錯誤
          try:
              sys.stdout.reconfigure(encoding='utf-8', errors='replace')
              sys.stderr.reconfigure(encoding='utf-8', errors='replace')
          except Exception:
              pass

          def _soft_cancel(signum, frame):
              CANCEL.set()
              try:
                  sys.stdout.reconfigure(encoding='utf-8')
                  sys.stderr.reconfigure(encoding='utf-8')
              except Exception:
                  pass
              print(f"\n[WARN] 收到中斷訊號 ({signum})，將在安全點停止當前掃描並繼續下一個專案。", flush=True)

          signal.signal(signal.SIGINT, _soft_cancel)

          DEPARTMENT = os.getenv("DEPARTMENT", "OLD_TS")
          API = os.getenv("GITHUB_API", "https://api.github.com")
          MEND_URL = os.getenv("MEND_URL", "https://saas.mend.io")
          MEND_API_URL = os.getenv("MEND_API_URL", "https://api-saas.mend.io/api/v3.0")

          GITHUB_TOKEN = os.getenv("GITHUB_TOKEN")
          MEND_EMAIL = os.getenv("MEND_EMAIL")
          MEND_USER_KEY = os.getenv("MEND_USER_KEY")
          MEND_ORG_UUID = os.getenv("MEND_ORG_UUID")
          # Mend CLI (mend dep / mend code) 登入用：若 MEND_USER_KEY 帳號屬於多個 org 必須設定，
          # 否則掃描結果會落在該帳號「上次存取」的 org，在共用 runner 上不可預期
          MEND_ORGANIZATION = os.getenv("MEND_ORGANIZATION")

          CATEGORY_GROUPS_JSON_STR = os.getenv("CATEGORY_GROUPS_JSON", '{}')
          CATEGORY_GROUPS = json.loads(CATEGORY_GROUPS_JSON_STR)

          print("[DEBUG] MEND_USER_KEY present?", "YES" if MEND_USER_KEY else "NO")
          print("[DEBUG] MEND_ORG_UUID present?", "YES" if MEND_ORG_UUID else "NO")
          print("[DEBUG] DEPARTMENT:", DEPARTMENT)
          print("[DEBUG] CATEGORY_GROUPS:", CATEGORY_GROUPS)
          print("[DEBUG] COMPLIANCE_STANDARD:", COMPLIANCE_STANDARD)
          print("[DEBUG] MEND_CLI_PATH:", MEND_CLI_PATH)
          print("[DEBUG] MEND_UA_PATH:", MEND_UA_PATH)

          if not os.path.isfile(MEND_CLI_PATH):
              print(f"[ERROR] 找不到 Mend CLI，請確認這台 runner 上 {MEND_CLI_PATH} 這個檔案存在")
              sys.exit(1)

          if not os.path.isfile(MEND_UA_PATH):
              print(f"[ERROR] 找不到 Unified Agent 設定檔，請確認這台 runner 上 {MEND_UA_PATH} 這個檔案存在")
              sys.exit(1)

          HEADERS = {
              "Authorization": f"Bearer {GITHUB_TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          CATEGORY_MAP = {
              key: category
              for category, keys in CATEGORY_GROUPS.items()
              for key in keys
          }


          def detect_project_type(repo_project_type: str) -> str:
              return CATEGORY_MAP.get(repo_project_type, "UNKNOWN")

          # =========================
          # 取得「當下這個 repo」的 owner/name
          # GITHUB_REPOSITORY 是 GitHub Actions 觸發時內建就會有的環境變數，格式 "owner/repo"，不用另外設定
          # =========================
          def get_current_repo():
              full_name = os.getenv("GITHUB_REPOSITORY")
              if not full_name or "/" not in full_name:
                  print("[ERROR] 找不到 GITHUB_REPOSITORY 環境變數，這個腳本必須在 GitHub Actions 裡執行")
                  sys.exit(1)
              owner, repo = full_name.split("/", 1)
              return owner, repo


          def get_repo_properties(owner: str, repo: str) -> dict:
              url = f"{API}/repos/{owner}/{repo}/properties/values"
              resp = requests.get(url, headers=HEADERS, timeout=15)
              if resp.status_code == 404:
                  print(f"[WARN] {owner}/{repo} 沒有 custom properties 或無法存取 (404)")
                  return {}
              resp.raise_for_status()
              props = {}
              for item in resp.json():
                  props[item["property_name"]] = item["value"]
              return props

          # =========================
          # 通用：執行 Mend CLI 指令（mend dep / mend code 共用）
          # =========================
          # 從 Mend CLI 輸出的網址裡擷取 projectUuid，例如:
          # https://saas.mend.io/app/orgs/GSS/applications/summary?project=27677c04-59fb-4efa-8ff3-fc5cfd65e07a
          _PROJECT_UUID_RE = re.compile(r"[?&]project=([0-9a-fA-F-]{36})")

          def run_mend_command(cmd: list, label: str):
              """回傳 (success: bool, project_uuid: str|None)。
              project_uuid 是從 CLI 印出的網址直接擷取，比事後呼叫 API 查詢更可靠。"""
              print(f"[INFO] 執行命令 ({label}): {' '.join(cmd)}")

              env = os.environ.copy()
              env["MEND_URL"] = MEND_URL
              env["MEND_EMAIL"] = MEND_EMAIL
              env["MEND_USER_KEY"] = MEND_USER_KEY
              # 如果 MEND_USER_KEY 對應的帳號屬於多個 org，一定要設這個，
              # 否則掃描結果會跑到「這個帳號上次存取的 org」，在 CI/CD 共用 runner 上不可預期
              if MEND_ORGANIZATION:
                  env["MEND_ORGANIZATION"] = MEND_ORGANIZATION

              p = subprocess.Popen(
                  cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT,
                  text=True, encoding="utf-8", errors="replace", bufsize=1, env=env
              )

              rc = None
              found_uuid = None
              try:
                  for line in iter(p.stdout.readline, ''):
                      if CANCEL.is_set():
                          print(f"\n[WARN] 已收到取消旗標，停止 {label} 掃描…", flush=True)
                          break
                      sys.stdout.write(line); sys.stdout.flush()
                      m = _PROJECT_UUID_RE.search(line)
                      if m:
                          found_uuid = m.group(1)

                  if CANCEL.is_set() and p.poll() is None:
                      try: p.terminate()
                      except Exception: pass
                      try: p.wait(timeout=5)
                      except Exception:
                          try: p.kill()
                          except Exception: pass

                  if not CANCEL.is_set():
                      rc = p.wait()
                      if rc == 0:
                          print(f"[SUCCESS] {label} 掃描完成", flush=True)
                      else:
                          print(f"[ERROR] {label} 掃描失敗 (ReturnCode={rc})", flush=True)

              except KeyboardInterrupt:
                  CANCEL.set()
                  print(f"\n[WARN] 收到中斷，停止 {label} 掃描。", flush=True)
                  try: p.terminate()
                  except Exception: pass
                  try: p.wait(timeout=5)
                  except Exception:
                      try: p.kill()
                      except Exception: pass

              finally:
                  try:
                      if p.stdout: p.stdout.close()
                  except Exception:
                      pass

              if CANCEL.is_set():
                  print(f"[SKIP] {label} 已被取消。", flush=True)
                  return False, found_uuid

              return (rc == 0), found_uuid


          def run_mend_sca_scan(project_path, application_name, project_name):
              # 用 mend ua 包舊版 Unified Agent 跑掃描：ua 後面的參數是直接傳給 Unified Agent 本身的，
              # 不是 Mend CLI 自己的參數解析器，所以不支援 --non-interactive（拿掉，否則會直接報錯）
              cmd = [MEND_CLI_PATH, "ua", "-c", MEND_UA_PATH, "-d", project_path,
                     "-product", application_name, "-project", project_name]
              return run_mend_command(cmd, "SCA")


          def run_mend_sast_scan(project_path, application_name, project_name):
              cmd = [MEND_CLI_PATH, "code", "-d", project_path,
                     "--scope", f"{application_name}//{project_name}", "--non-interactive"]
              return run_mend_command(cmd, "SAST")

          # =========================
          # Mend AppSec Platform API (v3.0) - 統一認證與報告下載
          # 官方文件參考:
          #   SBOM (Dependencies - SCA): https://api-docs.mend.io/platform/3.0/reports/exportsbomreport
          #   Risk Report (Dependencies - SCA): https://api-docs.mend.io/platform/3.0/reports/exportprojectriskreport
          #   Inventory Report (Dependencies - SCA): https://api-docs.mend.io/platform/3.0/reports/exportprojectinventoryreport
          #   Due Diligence Report (Dependencies - SCA): https://api-docs.mend.io/platform/3.0/reports/exportprojectduediligencereport
          #   Code Compliance Report (SAST): https://api-docs.mend.io/platform/3.0/reports/exportcodecompliancereport
          #   Download Report: https://api-docs.mend.io/platform/3.0/reports/downloadreport
          # 認證流程: login (email+userKey+orgUuid) -> refreshToken -> login/accessToken -> jwtToken (30分鐘效期)
          #
          # !!! 注意 !!!
          # dependencies/reports/risk 與 dependencies/reports/inventory 這兩個路徑的文件頁面
          # 抓取時只回傳到標題 (確認是 "Dependencies - SCA" 底下的端點)，沒有拿到逐欄位內容，
          # 是依 SBOM ("dependencies/reports/SBOM") 與 Due Diligence ("dependencies/reports/dueDiligence")
          # 已驗證路徑的命名規律，以及 reportType enum 中本來就有的 "risk"、"inventory" 值推斷出來的。
          # 正式使用前請先用 Postman 或測試環境實際打一次確認路徑與必要欄位。
          # =========================
          _jwt_state = {"token": None, "expires_at": 0}

          def get_mend_platform_token() -> str:
              if _jwt_state["token"] and time.time() < _jwt_state["expires_at"]:
                  return _jwt_state["token"]

              login_payload = {"email": MEND_EMAIL, "userKey": MEND_USER_KEY, "orgUuid": MEND_ORG_UUID}
              login_resp = requests.post(f"{MEND_API_URL}/login", json=login_payload, timeout=30)
              login_resp.raise_for_status()
              refresh_token = login_resp.json()["response"]["refreshToken"]

              token_resp = requests.post(
                  f"{MEND_API_URL}/login/accessToken",
                  headers={"wss-refresh-token": refresh_token},
                  params={"orgUuid": MEND_ORG_UUID},
                  json={},
                  timeout=30
              )
              token_resp.raise_for_status()
              jwt_token = token_resp.json()["response"]["jwtToken"]

              _jwt_state["token"] = jwt_token
              _jwt_state["expires_at"] = time.time() + 25 * 60  # 提前於 30 分鐘效期到期前換新
              return jwt_token


          def mend_platform_headers() -> dict:
              return {"Authorization": f"Bearer {get_mend_platform_token()}", "Content-Type": "application/json"}


          def get_project_uuid(application_name: str, project_name: str):
              """
              GET /api/v3.0/orgs/{orgUuid}/projects?filter=name:equals:{project_name}
              比對 applicationName 確保是同一個 Application 底下的 Project
              (SCA 與 SAST 掃描共用同一個 Application//Project scope，所以只需要查一次)
              """
              url = f"{MEND_API_URL}/orgs/{MEND_ORG_UUID}/projects"
              params = {"filter": f"name:equals:{project_name}"}
              resp = requests.get(url, headers=mend_platform_headers(), params=params, timeout=30)
              resp.raise_for_status()
              for proj in resp.json().get("response", []):
                  if proj.get("name") == project_name and proj.get("applicationName") == application_name:
                      return proj.get("uuid")
              return None


          def wait_for_project_uuid(application_name: str, project_name: str,
                                     max_retries=PROJECT_WAIT_MAX_RETRIES, wait_seconds=PROJECT_WAIT_INTERVAL_SECONDS):
              for attempt in range(1, max_retries + 1):
                  project_uuid = get_project_uuid(application_name, project_name)
                  if project_uuid:
                      return project_uuid
                  print(f"[INFO] Mend 後台尚未處理完成，等待 {wait_seconds} 秒後重試 ({attempt}/{max_retries})...")
                  time.sleep(wait_seconds)
              return None


          def generate_and_download_v3_report(create_path: str, payload: dict, output_path: str, label: str) -> bool:
              """
              共用流程: 建立報告 -> 輪詢狀態 -> 下載
              create_path 例如 f"projects/{project_uuid}/dependencies/reports/risk"
              """
              headers = mend_platform_headers()
              resp = requests.post(f"{MEND_API_URL}/{create_path}", json=payload, headers=headers, timeout=60)
              if resp.status_code not in (200, 201, 202):
                  print(f"[ERROR] 建立 {label} 失敗，status={resp.status_code}, body={resp.text[:300]}")
                  return False

              report_uuid = resp.json().get("response", {}).get("uuid")
              if not report_uuid:
                  print(f"[ERROR] 無法取得 {label} 的 report uuid: {resp.text[:300]}")
                  return False

              for attempt in range(1, REPORT_POLL_MAX_RETRIES + 1):
                  sresp = requests.get(
                      f"{MEND_API_URL}/orgs/{MEND_ORG_UUID}/reports/{report_uuid}",
                      headers=mend_platform_headers(), timeout=30
                  )
                  sresp.raise_for_status()
                  status = sresp.json().get("response", {}).get("status")
                  print(f"[INFO] {label} 狀態: {status} ({attempt}/{REPORT_POLL_MAX_RETRIES})")
                  if status == "SUCCESS":
                      break
                  if status in ("FAILED", "FAILURE"):
                      print(f"[ERROR] {label} 產生失敗")
                      return False
                  time.sleep(REPORT_POLL_INTERVAL_SECONDS)
              else:
                  print(f"[ERROR] {label} 輪詢逾時")
                  return False

              dresp = requests.get(
                  f"{MEND_API_URL}/orgs/{MEND_ORG_UUID}/reports/download/{report_uuid}",
                  headers=mend_platform_headers(), timeout=120
              )
              if dresp.status_code != 200:
                  print(f"[ERROR] {label} 下載失敗，status={dresp.status_code}")
                  return False

              with open(output_path, "wb") as f:
                  f.write(dresp.content)
              print(f"[SUCCESS] {label} 已下載: {output_path}")
              return True


          def download_sbom_report(project_uuid: str, output_path: str) -> bool:
              payload = {"name": "SBOM Report", "format": SBOM_FORMAT, "reportType": SBOM_REPORT_TYPE}
              return generate_and_download_v3_report(
                  f"projects/{project_uuid}/dependencies/reports/SBOM", payload, output_path, "SBOM"
              )


          def download_risk_report(project_uuid: str, output_path: str) -> bool:
              payload = {"name": "Risk Report", "format": RISK_REPORT_FORMAT}
              return generate_and_download_v3_report(
                  f"projects/{project_uuid}/dependencies/reports/risk", payload, output_path, "Risk Report"
              )


          def download_inventory_report(project_uuid: str, output_path: str) -> bool:
              payload = {"name": "Inventory Report", "format": INVENTORY_REPORT_FORMAT}
              return generate_and_download_v3_report(
                  f"projects/{project_uuid}/dependencies/reports/inventory", payload, output_path, "Inventory Report"
              )


          def download_due_diligence_report(project_uuid: str, output_path: str) -> bool:
              payload = {"name": "Due Diligence Report", "format": DUE_DILIGENCE_FORMAT}
              return generate_and_download_v3_report(
                  f"projects/{project_uuid}/dependencies/reports/dueDiligence", payload, output_path, "Due Diligence Report"
              )


          def download_code_compliance_report(project_uuid: str, output_path: str) -> bool:
              payload = {
                  "name": "Code Compliance Report",
                  "format": "pdf",
                  "exportMode": "fullPdf",
                  "complianceStandard": COMPLIANCE_STANDARD,
                  "reportLevel": COMPLIANCE_REPORT_LEVEL
              }
              return generate_and_download_v3_report(
                  f"projects/{project_uuid}/code/reports/compliance", payload, output_path, "Code Compliance Report"
              )

          # =========================
          # 檔案名稱依副檔名決定（依格式）
          # =========================
          _EXT_MAP = {"json": "json", "xml": "xml", "excel": "xlsx", "pdf": "pdf"}

          def _ext_for(fmt: str) -> str:
              return _EXT_MAP.get(fmt, fmt)

          # =========================
          # 主程式
          # =========================
          def main():
              github_org, github_repo = get_current_repo()
              print(f"[INFO] 只掃描當下這個 repo: {github_org}/{github_repo}")

              results = []
              reports_root = os.path.join(os.getcwd(), "Reports")
              os.makedirs(reports_root, exist_ok=True)

              print(f"\n[INFO] ========== 處理 Repository: {github_org}/{github_repo} ==========")

              props = get_repo_properties(github_org, github_repo)
              repo_project_type = props.get("category", "UNKNOWN")
              print(f"[INFO] category: {repo_project_type}")

              project_type_for_mend = detect_project_type(repo_project_type)
              if project_type_for_mend == "UNKNOWN":
                  print(f"[WARN] {github_org}/{github_repo} 沒有設定 category 或不在對照表中，跳過")
                  with open("mend_scan_results.json", "w", encoding="utf-8") as f:
                      json.dump(results, f, indent=2, ensure_ascii=False)
                  return

              application_name = f"{DEPARTMENT}_{project_type_for_mend}"
              project_name = github_repo
              print(f"[INFO] Mend 對應 -> Application: {application_name} / Project: {project_name}")

              # 每個 project 一個資料夾: Reports/{project_name}/
              project_report_dir = os.path.join(reports_root, project_name)
              os.makedirs(project_report_dir, exist_ok=True)

              record = {
                  "repo": f"{github_org}/{github_repo}",
                  "application": application_name,
                  "project": project_name,
                  "sca_success": False,
                  "sast_success": False,
                  "reports": {}
              }

              try:
                  # GITHUB_WORKSPACE 就是 actions/checkout 已經 checkout 好的路徑，
                  # 不用再重新 git clone 一次
                  project_path = os.getenv("GITHUB_WORKSPACE", os.getcwd())
                  print(f"[INFO] 掃描路徑: {project_path}")

                  sca_ok, sca_uuid = run_mend_sca_scan(project_path, application_name, project_name)
                  record["sca_success"] = sca_ok

                  sast_ok, sast_uuid = run_mend_sast_scan(project_path, application_name, project_name)
                  record["sast_success"] = sast_ok

                  if (sca_ok or sast_ok) and not CANCEL.is_set():
                      # 優先用掃描時直接從 CLI 輸出擷取到的 projectUuid（比事後查 API 更可靠）
                      project_uuid = sca_uuid or sast_uuid
                      if not project_uuid:
                          print("[INFO] 掃描輸出裡沒擷取到 projectUuid，改用 API 查詢 fallback")
                          project_uuid = wait_for_project_uuid(application_name, project_name)

                      if project_uuid:
                          if sca_ok:
                              sbom_path = os.path.join(project_report_dir, f"SBOM.{_ext_for(SBOM_FORMAT)}")
                              if download_sbom_report(project_uuid, sbom_path):
                                  record["reports"]["sbom"] = sbom_path

                              risk_path = os.path.join(project_report_dir, f"RISK_REPORT.{_ext_for(RISK_REPORT_FORMAT)}")
                              if download_risk_report(project_uuid, risk_path):
                                  record["reports"]["risk_report"] = risk_path

                              inv_path = os.path.join(project_report_dir, f"INVENTORY_REPORT.{_ext_for(INVENTORY_REPORT_FORMAT)}")
                              if download_inventory_report(project_uuid, inv_path):
                                  record["reports"]["inventory_report"] = inv_path

                              dd_path = os.path.join(project_report_dir, f"DUE_DILIGENCE_REPORT.{_ext_for(DUE_DILIGENCE_FORMAT)}")
                              if download_due_diligence_report(project_uuid, dd_path):
                                  record["reports"]["due_diligence_report"] = dd_path

                          if sast_ok:
                              cc_path = os.path.join(project_report_dir, "CODE_COMPLIANCE_REPORT.pdf")
                              if download_code_compliance_report(project_uuid, cc_path):
                                  record["reports"]["code_compliance_report"] = cc_path
                      else:
                          print(f"[WARN] 找不到 {application_name}//{project_name} 的 projectUuid，略過報告下載")

              except Exception as e:
                  print(f"[!] 處理 {github_org}/{github_repo} 時發生例外: {e}")

              results.append(record)

              with open("mend_scan_results.json", "w", encoding="utf-8") as f:
                  json.dump(results, f, indent=2, ensure_ascii=False)

              print("[INFO] 所有結果已寫入 mend_scan_results.json")

          if __name__ == "__main__":
              main()

      - name: Upload Reports to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GSS_Report
          path: Reports/**
